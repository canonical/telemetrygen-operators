[tox]
no_package = True
skip_missing_interpreters = True
env_list = lint, static, unit

[vars]
src_path = {tox_root}/src
tests_path = {tox_root}/tests
lib_path = {tox_root}/lib/charms/telemetrygen_k8s
all_path = {[vars]src_path} {[vars]tests_path}

[testenv]
set_env =
    PYTHONPATH = {tox_root}/lib:{[vars]src_path}
    PYTHONBREAKPOINT=ipdb.set_trace
    PY_COLORS=1
pass_env =
    PYTHONPATH
    CHARM_BUILD_DIR
    MODEL_SETTINGS
virtualenv =
    copy = True

[testenv:fmt]
description = Apply coding style standards to code
deps =
    ruff
commands =
    ruff format {[vars]all_path}
    ruff check --fix {[vars]all_path}

[testenv:lint]
description = Check code against coding style standards
deps =
    ruff
    codespell
commands =
    codespell {[vars]all_path}
    ruff check {[vars]all_path}
    ruff format --check --diff {[vars]all_path}

[testenv:lock]
description = Update uv.lock with the latest deps
allowlist_externals = uv
commands =
  uv lock --upgrade --no-cache

[testenv:static]
description = Run static type checks
deps =
    pyright
    .
commands =
    pyright {[vars]src_path}

[testenv:unit]
description = Run unit tests
deps =
    pytest
    coverage[toml]
    ops[testing]
    .
commands =
    coverage run --source={[vars]src_path} -m pytest -v --tb native {[vars]tests_path}/unit {posargs}
    coverage report

[testenv:interface]
description = Run interface tests
deps =
    pytest
    pytest-interface-tester
    .
commands =
    pytest -v --tb native {[vars]tests_path}/interface {posargs}

[testenv:integration]
description = Run integration tests against a real juju controller
deps =
    pytest
    jubilant
    pytest-jubilant>=2,<3
    pytest-bdd
    tenacity
    .
pass_env =
    {[testenv]pass_env}
    CHARM_PATH
    JUJU_*
commands =
    pytest -v --tb native {[vars]tests_path}/integration {posargs}
